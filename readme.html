
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Divertida</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .container{
            text-align:center;
            background: rgba(255,255,255,0.15);
            padding:40px;
            border-radius:20px;
            backdrop-filter: blur(10px);
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h1{
            font-size:3rem;
            margin-bottom:15px;
        }

        p{
            font-size:1.2rem;
            margin-bottom:25px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:white;
            color:#2575fc;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 Bem-vindo!</h1>
        <p> Você está feliz hoje?</p>
        <a href="#" class="btn">Começar 🚀</a>
    </div>

</body>
</html>
