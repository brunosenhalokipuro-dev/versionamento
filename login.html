<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Login e Home</title>
    <style>
        /* Estilos Gerais */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        
        /* Inputs e Botões */
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        
        .btn-login { background: #007bff; }
        .btn-login:hover { background: #0056b3; }
        .btn-sair { background: #dc3545; margin-top: 20px; }
        .btn-sair:hover { background: #bd2130; }
        
        .error { color: red; font-size: 14px; margin-top: 10px; }

        /* REGRA PRINCIPAL: Esconde a tela por padrão */
        .escondido { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. TELA DE LOGIN (Aparece primeiro) -->
    <div id="telaLogin" class="card">
        <h2>Entrar no Sistema</h2>
        <form id="formulario">
            <input type="text" id="usuario" placeholder="Usuário: admin" required>
            <input type="password" id="senha" placeholder="Senha: 1234" required>
            <button type="submit" class="btn-login">Entrar</button>
            <p id="mensagemErro" class="error"></p>
        </form>
    </div>

    <!-- 2. TELA HOME (Fica escondida até o login estar correto) -->
    <div id="telaHome" class="card escondido">
        <h2>Bem-vindo à Home! 🚀</h2>
        <p style="margin-top: 15px; color: #555;">Você passou pelo login com sucesso.</p>
        <button id="botaoSair" class="btn-sair">Sair do Sistema</button>
    </div>

    <!-- LÓGICA DO JAVASCRIPT -->
    <script>
        const formulario = document.getElementById('formulario');
        const telaLogin = document.getElementById('telaLogin');
        const telaHome = document.getElementById('telaHome');
        const mensagemErro = document.getElementById('mensagemErro');
        const botaoSair = document.getElementById('botaoSair');

        // Ação de clicar no botão Entrar
        formulario.addEventListener('submit', function(evento) {
            evento.preventDefault(); // Evita que a página recarregue e limpe o teste

            const campoUsuario = document.getElementById('usuario').value;
            const campoSenha = document.getElementById('senha').value;

            // Validação das credenciais para liberar a Home
            if (campoUsuario === 'admin' && campoSenha === '1234') {
                telaLogin.classList.add('escondido'); // Esconde o Login
                telaHome.classList.remove('escondido'); // Mostra a Home
                mensagemErro.innerText = ''; // Limpa erros anteriores
                formulario.reset(); // Limpa os campos de texto
            } else {
                mensagemErro.innerText = 'Usuário ou senha incorretos!';
            }
        });

        // Ação de clicar no botão Sair
        botaoSair.addEventListener('click', function() {
            telaHome.classList.add('escondido'); // Esconde a Home
            telaLogin.classList.remove('escondido'); // Mostra o Login novamente
        });
    </script>

</body>
</html>
